openapi: "3.0.3"
info:
  title: Circular References Test Fixture
  description: >
    A spec designed to test circular / recursive schema references.
    Includes a simple A-B cycle and a self-referencing tree node.
  version: "1.0.0"

servers:
  - url: https://api.example.com/v1

paths:
  /employees:
    get:
      operationId: listEmployees
      summary: List employees (A references B, B references A)
      responses:
        "200":
          description: A list of employees
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Employee"

  /departments:
    get:
      operationId: listDepartments
      summary: List departments (B references A)
      responses:
        "200":
          description: A list of departments
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Department"

  /categories:
    get:
      operationId: listCategories
      summary: List categories (self-referencing tree)
      responses:
        "200":
          description: A tree of categories
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Category"

  /filesystem:
    get:
      operationId: getFilesystem
      summary: Get filesystem tree (self-referencing with union)
      responses:
        "200":
          description: Root filesystem node
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FileSystemNode"

components:
  schemas:
    # ---------------------------------------------------------------
    # Simple cycle: Employee -> Department -> Employee
    # ---------------------------------------------------------------
    Employee:
      type: object
      required:
        - id
        - name
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
        department:
          $ref: "#/components/schemas/Department"
        manager:
          $ref: "#/components/schemas/Employee"

    Department:
      type: object
      required:
        - id
        - name
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
        head:
          $ref: "#/components/schemas/Employee"
        members:
          type: array
          items:
            $ref: "#/components/schemas/Employee"

    # ---------------------------------------------------------------
    # Self-referencing: tree node with children of the same type
    # ---------------------------------------------------------------
    Category:
      type: object
      required:
        - id
        - name
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
        parent:
          $ref: "#/components/schemas/Category"
        children:
          type: array
          items:
            $ref: "#/components/schemas/Category"

    # ---------------------------------------------------------------
    # Self-referencing with additional complexity (nullable + union)
    # ---------------------------------------------------------------
    FileSystemNode:
      type: object
      required:
        - name
        - kind
      properties:
        name:
          type: string
        kind:
          type: string
          enum:
            - file
            - directory
            - symlink
        sizeBytes:
          type: integer
          format: int64
          nullable: true
        children:
          type: array
          items:
            $ref: "#/components/schemas/FileSystemNode"
        symlinkTarget:
          $ref: "#/components/schemas/FileSystemNode"
        metadata:
          type: object
          additionalProperties:
            type: string
