name: degenerate
description: Generate typesafe Dart API clients from OpenAPI 3.x specs. Produces idiomatic models, serialization, and HTTP clients with pluggable adapters.
version: 0.1.3
repository: https://github.com/blopker/degenerate

executables:
  degenerate: degenerate

platforms:
  linux:
  macos:
  windows:

environment:
  sdk: ^3.11.1

dependencies:
  args: ^2.7.0
  yaml: ^3.1.0
  code_builder: ^4.10.0
  path: ^1.9.0
  collection: ^1.19.0

workspace:
  - packages/*
  - snapshots/specs/*
  - snapshots/public/*
  - test/wire/*
  - example
  - example/petstore_client

dev_dependencies:
  dart_style: ^3.0.0
  lints: ^6.0.0
  test: ^1.25.6
  yaml_edit: ^2.2.4
